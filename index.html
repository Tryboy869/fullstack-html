<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rentme — Test Turso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0F13;
      color: #F0F0FF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    p { color: #9090B0; margin-bottom: 2rem; font-size: 0.95rem; }

    .card {
      background: #17171F;
      border: 1px solid #2A2A3A;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
    }

    .form-group { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: 0.82rem;
      color: #9090B0;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      background: #1E1E2A;
      border: 1px solid #2A2A3A;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #F0F0FF;
      font-family: monospace;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #6C63FF; }
    input::placeholder { color: #4A4A6A; }

    button {
      width: 100%;
      background: #6C63FF;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #5A52E0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      display: none;
    }

    .result.success {
      background: rgba(76,175,80,0.15);
      border: 1px solid rgba(76,175,80,0.3);
      color: #4CAF50;
      display: block;
    }

    .result.error {
      background: rgba(255,107,107,0.15);
      border: 1px solid rgba(255,107,107,0.3);
      color: #FF6B6B;
      display: block;
    }

    .result.info {
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      color: #A0A0FF;
      display: block;
    }

    .log {
      margin-top: 1rem;
      background: #0F0F13;
      border: 1px solid #2A2A3A;
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      color: #9090B0;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .log.visible { display: block; }
    .log-line { margin-bottom: 0.3rem; }
    .log-line.ok { color: #4CAF50; }
    .log-line.err { color: #FF6B6B; }
    .log-line.info { color: #6C63FF; }

    .step {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
      font-size: 0.88rem;
      border-bottom: 1px solid #2A2A3A;
    }
    .step:last-child { border-bottom: none; }

    .step-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-icon.pending { background: #2A2A3A; color: #9090B0; }
    .step-icon.running { background: rgba(108,99,255,0.3); color: #6C63FF; animation: pulse 1s infinite; }
    .step-icon.ok { background: rgba(76,175,80,0.3); color: #4CAF50; }
    .step-icon.fail { background: rgba(255,107,107,0.3); color: #FF6B6B; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    .steps { margin-top: 1.5rem; display: none; }
    .steps.visible { display: block; }

    .hint {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: #6A6A8A;
      line-height: 1.5;
    }

    .hint a { color: #6C63FF; text-decoration: none; }
  </style>
</head>
<body>

  <h1>Rentme — Test Turso</h1>
  <p>Verifie que ta base de donnees Turso est correctement configuree</p>

  <div class="card">
    <div class="form-group">
      <label>TURSO_DATABASE_URL</label>
      <input type="text" id="db-url"
        placeholder="libsql://ton-db-ton-org.turso.io"
        autocomplete="off" spellcheck="false">
    </div>

    <div class="form-group">
      <label>TURSO_AUTH_TOKEN</label>
      <input type="password" id="db-token"
        placeholder="eyJhbGci..."
        autocomplete="off">
    </div>

    <button id="test-btn" onclick="runTest()">
      Tester la connexion
    </button>

    <div class="steps" id="steps">
      <div class="step">
        <div class="step-icon pending" id="icon-1">1</div>
        <span id="label-1">Validation des champs</span>
      </div>
      <div class="step">
        <div class="step-icon pending" id="icon-2">2</div>
        <span id="label-2">Connexion a Turso</span>
      </div>
      <div class="step">
        <div class="step-icon pending" id="icon-3">3</div>
        <span id="label-3">Creation de la table de test</span>
      </div>
      <div class="step">
        <div class="step-icon pending" id="icon-4">4</div>
        <span id="label-4">Ecriture d'une ligne</span>
      </div>
      <div class="step">
        <div class="step-icon pending" id="icon-5">5</div>
        <span id="label-5">Lecture de la ligne</span>
      </div>
    </div>

    <div class="result" id="result"></div>
    <div class="log" id="log"></div>

    <div class="hint">
      Trouve tes credentials sur
      <a href="https://turso.tech" target="_blank">turso.tech</a>
      — Dashboard &rsaquo; ton projet &rsaquo; Generate Token
    </div>
  </div>

<script>
  function log(msg, type = 'info') {
    const logEl = document.getElementById('log');
    logEl.classList.add('visible');
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStep(n, status, label) {
    const icon = document.getElementById(`icon-${n}`);
    const labelEl = document.getElementById(`label-${n}`);
    icon.className = `step-icon ${status}`;
    const symbols = { pending: n, running: '...', ok: '✓', fail: '✗' };
    icon.textContent = symbols[status] || n;
    if (label) labelEl.textContent = label;
  }

  function showResult(msg, type) {
    const el = document.getElementById('result');
    el.className = `result ${type}`;
    el.textContent = msg;
  }

  async function tursoQuery(url, token, sql, args = []) {
    const httpUrl = url
      .replace('libsql://', 'https://')
      .replace('wss://', 'https://')
      .replace('ws://', 'http://');

    const res = await fetch(`${httpUrl}/v2/pipeline`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        requests: [
          {
            type: 'execute',
            stmt: {
              sql,
              args: args.map(a => {
                if (typeof a === 'number') return { type: 'integer', value: String(a) };
                return { type: 'text', value: String(a) };
              })
            }
          },
          { type: 'close' }
        ]
      })
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(`HTTP ${res.status}: ${text}`);
    }

    const data = await res.json();

    if (data.results && data.results[0] && data.results[0].type === 'error') {
      throw new Error(data.results[0].error.message);
    }

    return data;
  }

  async function runTest() {
    const url = document.getElementById('db-url').value.trim();
    const token = document.getElementById('db-token').value.trim();
    const btn = document.getElementById('test-btn');

    // Reset
    document.getElementById('log').innerHTML = '';
    document.getElementById('log').classList.remove('visible');
    document.getElementById('result').className = 'result';
    document.getElementById('steps').classList.add('visible');
    for (let i = 1; i <= 5; i++) setStep(i, 'pending');

    btn.disabled = true;
    btn.textContent = 'Test en cours...';

    // STEP 1 - Validation
    setStep(1, 'running', 'Validation des champs...');
    await sleep(300);

    if (!url || !token) {
      setStep(1, 'fail', 'Champs manquants');
      showResult('Remplis les deux champs avant de tester.', 'error');
      log('Champs vides detectes', 'err');
      reset(btn); return;
    }

    if (!url.includes('turso.io') && !url.includes('libsql://') && !url.includes('localhost')) {
      setStep(1, 'fail', 'URL invalide');
      showResult('L\'URL doit ressembler a : libsql://ton-db.turso.io', 'error');
      log(`URL suspecte : ${url}`, 'err');
      reset(btn); return;
    }

    setStep(1, 'ok', 'Champs valides');
    log('Champs valides', 'ok');

    // STEP 2 - Connexion
    setStep(2, 'running', 'Connexion a Turso...');
    log(`Tentative de connexion a ${url}`, 'info');

    try {
      await tursoQuery(url, token, 'SELECT 1');
      setStep(2, 'ok', 'Connexion reussie');
      log('Connexion etablie avec succes', 'ok');
    } catch (e) {
      setStep(2, 'fail', 'Connexion echouee');
      showResult(`Connexion echouee : ${e.message}`, 'error');
      log(`Erreur connexion : ${e.message}`, 'err');
      reset(btn); return;
    }

    // STEP 3 - Create table
    setStep(3, 'running', 'Creation de la table de test...');
    try {
      await tursoQuery(url, token,
        `CREATE TABLE IF NOT EXISTS rentme_test (
          id INTEGER PRIMARY KEY AUTOINCREMENT,
          message TEXT,
          created_at TEXT DEFAULT (datetime('now'))
        )`
      );
      setStep(3, 'ok', 'Table creee');
      log('Table rentme_test creee ou existante', 'ok');
    } catch (e) {
      setStep(3, 'fail', 'Echec creation table');
      showResult(`Erreur creation table : ${e.message}`, 'error');
      log(`Erreur : ${e.message}`, 'err');
      reset(btn); return;
    }

    // STEP 4 - Write
    setStep(4, 'running', 'Ecriture d\'une ligne...');
    try {
      await tursoQuery(url, token,
        `INSERT INTO rentme_test (message) VALUES (?)`,
        ['Test Rentme OK']
      );
      setStep(4, 'ok', 'Ecriture reussie');
      log('Ligne inseree avec succes', 'ok');
    } catch (e) {
      setStep(4, 'fail', 'Echec ecriture');
      showResult(`Erreur ecriture : ${e.message}`, 'error');
      log(`Erreur : ${e.message}`, 'err');
      reset(btn); return;
    }

    // STEP 5 - Read
    setStep(5, 'running', 'Lecture de la ligne...');
    try {
      const data = await tursoQuery(url, token,
        `SELECT * FROM rentme_test ORDER BY id DESC LIMIT 1`
      );
      const result = data.results[0].response.result;
      const row = result.rows[0];
      const msg = row[1]?.value || 'lu';
      setStep(5, 'ok', `Lu : "${msg}"`);
      log(`Lecture reussie : ${JSON.stringify(row)}`, 'ok');

      showResult(
        'Turso fonctionne parfaitement. La base de donnees est prete pour Rentme.',
        'success'
      );
    } catch (e) {
      setStep(5, 'fail', 'Echec lecture');
      showResult(`Erreur lecture : ${e.message}`, 'error');
      log(`Erreur : ${e.message}`, 'err');
      reset(btn); return;
    }

    reset(btn);
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function reset(btn) {
    btn.disabled = false;
    btn.textContent = 'Tester la connexion';
  }
</script>

</body>
</html>
