<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Demo · GitHub DB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3e;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --success: #4ade80;
      --error: #f87171;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      overflow-x: hidden;
    }

    /* BACKGROUND GRID */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    /* GLOW ORBS */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .orb2 {
      position: fixed;
      bottom: -20%;
      right: -10%;
      width: 50vw;
      height: 50vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,101,132,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* LAYOUT */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* CARD */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      position: relative;
      animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(108,99,255,0.4), transparent 50%, rgba(255,101,132,0.2));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* LOGO / HEADER */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .logo-text strong {
      display: block;
      font-size: 15px;
      color: var(--text);
      font-weight: 500;
      letter-spacing: 0;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 32px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 7px;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
      letter-spacing: 0.02em;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(108,99,255,0.35);
    }

    /* FORM */
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    input::placeholder { color: var(--muted); opacity: 0.5; }

    /* BUTTON */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(108,99,255,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(108,99,255,0.45);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      margin-top: 10px;
    }
    .btn-secondary:hover { background: var(--border); color: var(--text); }

    /* SPINNER */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ALERT */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-family: var(--font-mono);
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .alert.show { display: flex; align-items: center; gap: 10px; }
    .alert-error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .alert-success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    /* DASHBOARD */
    #dashboard { display: none; }
    #dashboard.visible { display: block; }
    #auth-panel { display: block; }
    #auth-panel.hidden { display: none; }

    .dash-header {
      margin-bottom: 28px;
    }
    .dash-greeting {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .dash-greeting span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dash-sub {
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--muted);
    }

    .info-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
    }
    .info-row .key {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .info-row .val {
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--text);
      font-weight: 500;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      margin-right: 6px;
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .token-preview {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 24px;
    }
    .token-preview .key {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .token-preview .val {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--accent);
      word-break: break-all;
      opacity: 0.8;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* LOADING STATE */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s, visibility 0.4s;
    }
    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }
    .loading-inner {
      text-align: center;
    }
    .loading-icon {
      font-size: 32px;
      margin-bottom: 16px;
      animation: bounce 1s ease infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .loading-text {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--muted);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loading-screen">
  <div class="loading-inner">
    <div class="loading-icon">⟳</div>
    <div class="loading-text">CHECKING SESSION...</div>
  </div>
</div>

<div class="orb2"></div>

<div class="page">
  <div class="card">

    <!-- ===== AUTH PANEL ===== -->
    <div id="auth-panel">
      <div class="logo">
        <div class="logo-icon">◈</div>
        <div class="logo-text">
          <strong>AuthDemo</strong>
          github-as-db · v1
        </div>
      </div>

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <div id="alert-box" class="alert"></div>

      <form id="auth-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
          <label>Username</label>
          <input id="input-username" type="text" placeholder="your_username" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input id="input-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">
          Login
        </button>
      </form>
    </div>

    <!-- ===== DASHBOARD ===== -->
    <div id="dashboard">
      <div class="logo">
        <div class="logo-icon">◈</div>
        <div class="logo-text">
          <strong>AuthDemo</strong>
          github-as-db · v1
        </div>
      </div>

      <div class="dash-header">
        <div class="dash-greeting">Welcome back, <br/><span id="dash-username">—</span></div>
        <div class="dash-sub"><span class="status-dot"></span>Session active · GitHub DB</div>
      </div>

      <div class="info-grid">
        <div class="info-row">
          <span class="key">Username</span>
          <span class="val" id="info-username">—</span>
        </div>
        <div class="info-row">
          <span class="key">Account created</span>
          <span class="val" id="info-created">—</span>
        </div>
        <div class="info-row">
          <span class="key">Storage</span>
          <span class="val">⬡ GitHub Repo</span>
        </div>
      </div>

      <div class="token-preview">
        <div class="key">JWT Token (localStorage)</div>
        <div class="val" id="token-preview">—</div>
      </div>

      <button class="btn btn-secondary" onclick="logout()">↩ Logout</button>
    </div>

  </div>
</div>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  // In Vercel, API is at /api/auth
  // Change this if running locally with a different port
  const API = '/api/auth';

  // ─── STATE ────────────────────────────────────────────────
  let currentTab = 'login';

  // ─── INIT ─────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    const token = localStorage.getItem('auth_token');
    if (token) {
      await verifySession(token);
    } else {
      hideLoading();
    }
  });

  async function verifySession(token) {
    try {
      const res = await fetch(`${API}?action=verify`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.ok) {
        const data = await res.json();
        showDashboard(data.username, data.created_at, token);
      } else {
        localStorage.removeItem('auth_token');
        hideLoading();
      }
    } catch {
      hideLoading();
    }
  }

  function hideLoading() {
    document.getElementById('loading-screen').classList.add('hidden');
  }

  // ─── TABS ─────────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    clearAlert();
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
    document.getElementById('submit-btn').textContent = tab === 'login' ? 'Login' : 'Create account';
    document.getElementById('input-password').autocomplete = tab === 'login' ? 'current-password' : 'new-password';
  }

  // ─── FORM SUBMIT ──────────────────────────────────────────
  async function handleSubmit(e) {
    e.preventDefault();
    clearAlert();

    const username = document.getElementById('input-username').value.trim();
    const password = document.getElementById('input-password').value;
    const btn = document.getElementById('submit-btn');

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span>${currentTab === 'login' ? 'Authenticating...' : 'Creating account...'}`;

    try {
      const res = await fetch(`${API}?action=${currentTab}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showAlert(data.error || 'Something went wrong', 'error');
      } else {
        localStorage.setItem('auth_token', data.token);
        showDashboard(data.username, data.created_at, data.token);
      }
    } catch (err) {
      showAlert('Network error — check your connection', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = currentTab === 'login' ? 'Login' : 'Create account';
    }
  }

  // ─── DASHBOARD ────────────────────────────────────────────
  function showDashboard(username, createdAt, token) {
    hideLoading();

    document.getElementById('auth-panel').classList.add('hidden');
    document.getElementById('dashboard').classList.add('visible');

    document.getElementById('dash-username').textContent = username;
    document.getElementById('info-username').textContent = username;
    document.getElementById('info-created').textContent = formatDate(createdAt);

    // Show token preview (first 40 chars)
    document.getElementById('token-preview').textContent = token.slice(0, 52) + '…';
  }

  function logout() {
    localStorage.removeItem('auth_token');
    document.getElementById('dashboard').classList.remove('visible');
    document.getElementById('auth-panel').classList.remove('hidden');
    document.getElementById('input-username').value = '';
    document.getElementById('input-password').value = '';
    switchTab('login');
  }

  // ─── HELPERS ──────────────────────────────────────────────
  function showAlert(msg, type) {
    const box = document.getElementById('alert-box');
    box.textContent = type === 'error' ? '✕ ' + msg : '✓ ' + msg;
    box.className = `alert show alert-${type}`;
  }

  function clearAlert() {
    const box = document.getElementById('alert-box');
    box.className = 'alert';
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }
</script>
</body>
</html>
