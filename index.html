<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

:root {
  --bg: #0a0a0a;
  --surface: #1a1a1a;
  --text: #ffffff;
  --muted: #888888;
  --accent: #2563eb;
  --success: #10b981;
  --warning: #f59e0b;
  --error: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

.container {
  text-align: center;
  max-width: 500px;
  padding: 2rem;
}

.logo {
  width: 80px;
  height: 80px;
  margin: 0 auto 2rem;
}

h1 {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 1rem;
}

.status {
  font-size: 0.9rem;
  color: var(--muted);
  margin-bottom: 2rem;
  min-height: 1.5rem;
}

.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 1rem;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--success));
  width: 0%;
  transition: width 0.3s ease;
  animation: shimmer 2s infinite;
}

@keyframes shimmer {
  0% { opacity: 0.6; }
  50% { opacity: 1; }
  100% { opacity: 0.6; }
}

.spinner {
  width: 40px;
  height: 40px;
  margin: 2rem auto;
  border: 3px solid var(--surface);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.error-box {
  background: var(--surface);
  border: 1px solid var(--error);
  border-radius: 12px;
  padding: 1.5rem;
  margin-top: 2rem;
  display: none;
}

.error-box.show { display: block; }

.error-box h2 {
  font-size: 1.125rem;
  color: var(--error);
  margin-bottom: 0.5rem;
}

.btn {
  display: inline-block;
  padding: 0.75rem 1.5rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 1rem;
  text-decoration: none;
  transition: background 0.2s;
}

.btn:hover { background: #1d4ed8; }

.metadata {
  margin-top: 2rem;
  padding-top: 2rem;
  border-top: 1px solid var(--surface);
  font-size: 0.8rem;
  color: var(--muted);
}

.metadata a {
  color: var(--accent);
  text-decoration: none;
}

.metadata a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="container">
  <!-- Logo animé SVG -->
  <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#2563eb"/>
        <stop offset="100%" stop-color="#10b981"/>
      </linearGradient>
    </defs>
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGrad)" stroke-width="3">
      <animate attributeName="stroke-dasharray" values="0 283;283 0" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M35,50 L50,65 L75,35" stroke="url(#logoGrad)" stroke-width="4" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0 100;100 0" dur="1.5s" fill="freeze"/>
    </path>
  </svg>

  <h1 id="title">Preparing your destination...</h1>
  <div class="status" id="status">Checking availability...</div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="spinner" id="spinner"></div>

  <div class="error-box" id="error">
    <h2>⚠️ Destination Unavailable</h2>
    <p id="error-msg">The target site is currently unreachable.</p>
    <button class="btn" onclick="retry()">Retry</button>
  </div>

  <div class="metadata">
    Powered by <a href="https://github.com/Tryboy869/api-in-browser">api-in-browser</a>
  </div>
</div>

<script type="module">
import API from 'https://cdn.jsdelivr.net/npm/api-in-browser/src/index.js';

// ================================================================
// CONFIGURATION
// ================================================================

const MESSAGES = [
  'Checking availability...',
  'Establishing connection...',
  'Waking up server...',
  'Almost there...',
  'Finalizing redirect...'
];

const PING_ATTEMPTS = 3;
const PING_DELAY = 2000; // 2 seconds between pings

// ================================================================
// STATE
// ================================================================

let currentStep = 0;
let targetUrl = null;

// ================================================================
// INITIALIZE API
// ================================================================

const api = new API({ storage: 'indexeddb', debug: true });
await api.listen();

// ================================================================
// URL MAPPINGS (stored in IndexedDB)
// ================================================================

// Exemple de mappings (normalement configurés via interface admin)
const DEFAULT_MAPPINGS = {
  '/projet1': 'https://example-project.onrender.com',
  '/portfolio': 'https://myportfolio.vercel.app',
  '/blog': 'https://myblog.netlify.app',
  '/demo': 'https://demo.railway.app'
};

// Initialize mappings if not exist
async function initMappings() {
  const existing = await api.storage.get('config', 'mappings');
  if (!existing) {
    await api.storage.set('config', 'mappings', DEFAULT_MAPPINGS);
  }
}

await initMappings();

// ================================================================
// GET TARGET URL FROM PATH
// ================================================================

async function getTargetUrl() {
  const path = window.location.pathname;
  const mappings = await api.storage.get('config', 'mappings');
  
  if (mappings && mappings[path]) {
    return mappings[path];
  }
  
  // Fallback: try to decode from hash
  const hash = window.location.hash.slice(1);
  if (hash) {
    try {
      return decodeURIComponent(hash);
    } catch (e) {
      console.error('Invalid hash:', e);
    }
  }
  
  return null;
}

// ================================================================
// HEALTH CHECK
// ================================================================

async function checkHealth(url, timeout = 5000) {
  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), timeout);
    
    const response = await fetch(url, {
      method: 'HEAD',
      mode: 'no-cors', // Important for CORS
      signal: controller.signal
    });
    
    clearTimeout(timeoutId);
    return true; // If fetch completes, site is reachable
  } catch (error) {
    console.log('Health check failed:', error.message);
    return false;
  }
}

// ================================================================
// PING TO WAKE UP
// ================================================================

async function pingToWake(url) {
  updateStatus('Server is sleeping. Waking it up...');
  
  for (let i = 0; i < PING_ATTEMPTS; i++) {
    updateProgress((i + 1) * 25);
    
    try {
      await fetch(url, { 
        method: 'GET',
        mode: 'no-cors'
      });
      
      updateStatus(`Ping ${i + 1}/${PING_ATTEMPTS} sent...`);
      
      // Wait before next ping
      await new Promise(resolve => setTimeout(resolve, PING_DELAY));
      
      // Check if now available
      const isAlive = await checkHealth(url);
      if (isAlive) {
        updateStatus('Server is awake! Redirecting...');
        return true;
      }
    } catch (error) {
      console.log(`Ping ${i + 1} failed:`, error);
    }
  }
  
  return false;
}

// ================================================================
// SEQUENTIAL STATUS MESSAGES
// ================================================================

function updateStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function updateProgress(percent) {
  document.getElementById('progress').style.width = `${percent}%`;
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').classList.add('show');
}

async function sequentialMessages() {
  for (let i = 0; i < MESSAGES.length; i++) {
    updateStatus(MESSAGES[i]);
    updateProgress((i + 1) * 20);
    await new Promise(resolve => setTimeout(resolve, 800));
  }
}

// ================================================================
// MAIN REDIRECT LOGIC
// ================================================================

async function smartRedirect() {
  // 1. Get target URL
  targetUrl = await getTargetUrl();
  
  if (!targetUrl) {
    showError('No destination configured for this URL.');
    return;
  }
  
  updateStatus(`Connecting to ${new URL(targetUrl).hostname}...`);
  
  // 2. Quick health check
  const isHealthy = await checkHealth(targetUrl, 3000);
  
  if (isHealthy) {
    // Site is up, redirect immediately
    updateProgress(100);
    updateStatus('Redirecting now...');
    setTimeout(() => {
      window.location.href = targetUrl;
    }, 500);
    return;
  }
  
  // 3. Site might be sleeping, try to wake it up
  await sequentialMessages();
  
  const wokeUp = await pingToWake(targetUrl);
  
  if (wokeUp) {
    updateProgress(100);
    setTimeout(() => {
      window.location.href = targetUrl;
    }, 1000);
  } else {
    // 4. Still unreachable after pings
    showError(`The destination site is currently unavailable. Please try again later.`);
    
    // Log failure
    await api.storage.set('logs', Date.now().toString(), {
      path: window.location.pathname,
      target: targetUrl,
      status: 'failed',
      timestamp: Date.now()
    });
  }
}

// ================================================================
// RETRY FUNCTION
// ================================================================

window.retry = async function() {
  document.getElementById('error').classList.remove('show');
  document.getElementById('spinner').style.display = 'block';
  updateProgress(0);
  await smartRedirect();
};

// ================================================================
// START
// ================================================================

smartRedirect();

// ================================================================
// ADMIN INTERFACE (only if ?admin=true)
// ================================================================

if (window.location.search.includes('admin=true')) {
  const adminPanel = document.createElement('div');
  adminPanel.innerHTML = `
    <div style="position:fixed;top:0;left:0;right:0;background:#1a1a1a;padding:1rem;border-bottom:1px solid #333;z-index:9999">
      <h3 style="margin-bottom:1rem">🔧 Router Admin</h3>
      <div style="display:grid;gap:0.5rem">
        <input type="text" id="admin-path" placeholder="Path (e.g., /projet1)" style="padding:0.5rem;border-radius:4px;border:1px solid #333;background:#0a0a0a;color:white">
        <input type="text" id="admin-url" placeholder="Target URL" style="padding:0.5rem;border-radius:4px;border:1px solid #333;background:#0a0a0a;color:white">
        <button onclick="addMapping()" style="padding:0.5rem;background:#2563eb;color:white;border:none;border-radius:4px;cursor:pointer">Add Mapping</button>
      </div>
      <div id="mappings-list" style="margin-top:1rem;font-size:0.85rem"></div>
    </div>
  `;
  document.body.appendChild(adminPanel);
  document.body.style.paddingTop = '300px';
  
  window.addMapping = async function() {
    const path = document.getElementById('admin-path').value;
    const url = document.getElementById('admin-url').value;
    
    if (path && url) {
      const mappings = await api.storage.get('config', 'mappings') || {};
      mappings[path] = url;
      await api.storage.set('config', 'mappings', mappings);
      
      document.getElementById('admin-path').value = '';
      document.getElementById('admin-url').value = '';
      
      alert(`✅ Mapping added: ${path} → ${url}`);
      loadMappings();
    }
  };
  
  async function loadMappings() {
    const mappings = await api.storage.get('config', 'mappings') || {};
    const list = document.getElementById('mappings-list');
    list.innerHTML = '<strong>Current mappings:</strong><br>' + 
      Object.entries(mappings)
        .map(([path, url]) => `${path} → ${url}`)
        .join('<br>');
  }
  
  loadMappings();
}
</script>

</body>
</html>
